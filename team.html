<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team | die Ragebaiters</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="memberModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" style="position:absolute; right:20px; top:10px; font-size:2.5rem; cursor:pointer;">&times;</span>
      <img id="modalImg" src="" alt="Profile" class="modal-img">
      <div id="modalRole" class="role-badge"></div>
      <h2 id="modalName" style="margin: 10px 0;"></h2>
      <p id="modalDesc" style="color: var(--muted); font-size: 1.1rem;"></p>
    </div>
  </div>

  <div class="top-banner">
    <img src="images/banner2.png" alt="die Ragebaiters Banner" />
  </div>

  <header class="container">
    <nav class="nav">
      <div class="nav-brand">
        <div class="nav-title">die Ragebaiters</div>
      </div>
      <button class="nav-toggle" type="button" aria-label="Menü" aria-expanded="false">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <div class="nav-links">
        <a href="index.html">Startseite</a>
        <a class="active" href="team.html">Team</a>
        <a href="mediathek.html">Mediathek</a>
        <a href="impressum.html">Impressum</a>
        <a class="social-icon" href="https://www.youtube.com/@RagebaitersAS" target="_blank" rel="noopener" aria-label="YouTube" title="YouTube">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M23.498 6.186a2.999 2.999 0 0 0-2.112-2.122C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.386.564A2.999 2.999 0 0 0 .502 6.186C0 8.074 0 12 0 12s0 3.926.502 5.814a2.999 2.999 0 0 0 2.112 2.122C4.495 20.5 12 20.5 12 20.5s7.505 0 9.386-.564a2.999 2.999 0 0 0 2.112-2.122C24 15.926 24 12 24 12s0-3.926-.502-5.814zM9.75 15.568V8.432L15.818 12 9.75 15.568z"/>
          </svg>
        </a>
        <a class="social-icon" href="https://www.instagram.com/die_ragebaiters/" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </a>
      </div>
    </nav>
    <div class="nav-backdrop" aria-hidden="true"></div>
  </header>

  <main class="container">
    <section class="section">
      <span class="eyebrow">Roster</span>
      <h2 style="margin: 10px 0 40px;">Die Einheit</h2>

      <div id="teamLeaderSection">
        <h3 style="color: var(--accent); margin-bottom: 20px;">Teamfuehrung</h3>
        <div id="teamLeaderGrid" class="member-grid" style="grid-template-columns: 1fr;">
          <div class="card" style="text-align:center; color: var(--muted);">Team wird geladen...</div>
        </div>
      </div>

      <div id="teamOperatorSection">
        <h3 style="margin: 40px 0 20px;">Operatoren</h3>
        <div id="teamOperatorGrid" class="member-grid">
          <div class="card" style="text-align:center; color: var(--muted);">Team wird geladen...</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer container">
    <div style="font-weight: 800;">die Ragebaiters</div>
    <div style="font-size: 0.8rem; opacity: 0.6;">Est. 2026 - Made by sneiper0</div>
  </footer>

  <script src="nav.js?v=2026-04-23-1" defer></script>
  <script src="config.js"></script>
  <script type="module">
    import { supabase, initPage } from './auth.js?v=2026-04-23-1';
    await initPage('team');

    const leaderGrid = document.getElementById('teamLeaderGrid');
    const operatorGrid = document.getElementById('teamOperatorGrid');
    const leaderSection = document.getElementById('teamLeaderSection');
    const operatorSection = document.getElementById('teamOperatorSection');
    const modal = document.getElementById('memberModal');
    const modalImg = document.getElementById('modalImg');
    const modalRole = document.getElementById('modalRole');
    const modalName = document.getElementById('modalName');
    const modalDesc = document.getElementById('modalDesc');
    const modalClose = document.querySelector('.modal-close');

    const fallbackTeamMembers = [
      { id: 'ben', name: 'Yotzek (Ben)', role: 'Teamfuehrer', description: 'Ben koordiniert die Truppe und bewahrt selbst im Gefecht einen kuehlen Kopf.', image_url: 'images/benf.png', is_leader: true, sort_order: 10 },
      { id: 'jason', name: 'sneiper0 (Jason)', role: 'Sniper', description: 'Praezisionsschuetze der Ragebaiters.', image_url: 'images/logo.png', is_leader: false, sort_order: 20 },
      { id: 'michael', name: 'MundMbrothers (Michael)', role: 'Medic', description: 'Sorgt fuer die Einsatzfaehigkeit des Teams.', image_url: 'images/michi2.png', is_leader: false, sort_order: 30 },
      { id: 'nils', name: 'Disccave (Nils)', role: 'Breacher / OG', description: 'Einer der OGs. Experte fuer Improvisation.', image_url: 'images/nils.png', is_leader: false, sort_order: 40 },
      { id: 'nathan', name: 'Nathan Goldstein (Nathan)', role: 'Support', description: 'Gibt Feuerschutz mit hohem Munitionsdurchsatz.', image_url: 'images/nathan.png', is_leader: false, sort_order: 50 },
      { id: 'riccardo', name: 'Gemeral Richard (Riccardo)', role: 'Breacher', description: 'Spezialist fuer CQB.', image_url: 'images/riccardo.png', is_leader: false, sort_order: 60 },
      { id: 'wolfgang', name: 'Wolfgang', role: 'Techniker', description: 'Haelt die Markierer am Laufen.', image_url: 'images/wolfgang.png', is_leader: false, sort_order: 70 }
    ];

    let teamMembers = fallbackTeamMembers;

    try {
      const { data, error } = await supabase.rpc('get_team_members');
      if (!error && Array.isArray(data)) {
        teamMembers = normalizeTeamMembers(data);
      }
    } catch (error) {
      console.error('[Ragebaiters] Team-Daten konnten nicht geladen werden:', error);
    }

    renderTeam(teamMembers);

    modalClose?.addEventListener('click', closeModal);
    window.addEventListener('click', event => {
      if (event.target === modal) closeModal();
    });

    function renderTeam(members) {
      const normalized = normalizeTeamMembers(members);
      const leaders = normalized.filter(member => member.is_leader);
      const operators = normalized.filter(member => !member.is_leader);

      leaderSection.hidden = !leaders.length;
      operatorSection.hidden = !operators.length;

      leaderGrid.innerHTML = leaders.length
        ? leaders.map(member => memberCardMarkup(member, true)).join('')
        : '<div class="card" style="text-align:center; color: var(--muted);">Noch keine Teamfuehrung hinterlegt.</div>';

      operatorGrid.innerHTML = operators.length
        ? operators.map(member => memberCardMarkup(member, false)).join('')
        : '<div class="card" style="text-align:center; color: var(--muted);">Noch keine Operatoren hinterlegt.</div>';

      [...leaderGrid.querySelectorAll('.member-card'), ...operatorGrid.querySelectorAll('.member-card')].forEach(card => {
        card.addEventListener('click', () => {
          const memberId = card.dataset.memberId;
          const member = normalized.find(entry => entry.id === memberId);
          if (member) openMember(member);
        });
      });
    }

    function memberCardMarkup(member, isLeader) {
      return `
        <div class="member-card" data-member-id="${escapeHtmlAttr(member.id)}" ${isLeader ? 'style="border: 2px solid var(--accent);"' : ''}>
          <div class="role-badge">${escapeHtml(member.role || (isLeader ? 'Teamfuehrung' : 'Operator'))}</div>
          <div style="${isLeader ? 'font-size: 1.8rem; font-weight: 900;' : 'font-weight:800;'}">${escapeHtml(member.name || 'Unbekannt')}</div>
        </div>`;
    }

    function openMember(member) {
      modalName.innerText = member.name || 'Unbekannt';
      modalRole.innerText = member.role || 'Operator';
      modalDesc.innerText = member.description || 'Keine Beschreibung hinterlegt.';
      modalImg.src = resolveTeamImage(member.image_url);
      modalImg.alt = member.name || 'Teammitglied';
      modal.style.display = 'flex';
    }

    function closeModal() {
      modal.style.display = 'none';
    }

    function resolveTeamImage(imageUrl) {
      return String(imageUrl || '').trim() || 'images/logo.png';
    }

    function normalizeTeamMembers(rawMembers) {
      const source = Array.isArray(rawMembers) ? rawMembers : fallbackTeamMembers;
      return source
        .map((member, index) => ({
          id: String(member?.id || `member-${index + 1}`),
          name: String(member?.name || ''),
          role: String(member?.role || ''),
          description: String(member?.description || member?.desc || ''),
          image_url: String(member?.image_url || member?.img || ''),
          is_leader: Boolean(member?.is_leader),
          sort_order: Number(member?.sort_order || (index + 1) * 10) || (index + 1) * 10
        }))
        .sort((a, b) => {
          if (Number(a.is_leader) !== Number(b.is_leader)) {
            return Number(b.is_leader) - Number(a.is_leader);
          }
          return a.sort_order - b.sort_order;
        });
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function escapeHtmlAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }
  </script>
</body>
</html>
