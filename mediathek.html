<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mediathek | die Ragebaiters</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Zusätzliches Styling für das Upload-Formular */
    .upload-area {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 30px;
      margin-bottom: 50px;
    }
    .upload-area h2 { color: var(--accent); margin-top: 0; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 0.9rem; }
    
    .upload-area input[type="text"], 
    .upload-area textarea,
    .upload-area input[type="file"] {
      width: 100%;
      padding: 12px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
    }

    .btn-upload {
      background: var(--accent);
      color: #000;
      font-weight: 800;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .btn-upload:hover { opacity: 0.9; }

    /* Galerie Styling */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }
    .media-card {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    .media-card:hover { transform: translateY(-5px); }
    .media-card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid var(--line); }
    .media-info { padding: 15px; }
    .media-info h3 { margin: 0 0 8px 0; color: var(--accent); font-size: 1.1rem; }
    .media-info p { margin: 0; color: var(--muted); font-size: 0.9rem; line-height: 1.4; }
  </style>
</head>
<body>

  <div class="top-banner">
    <img src="images/banner2.png" alt="die Ragebaiters Banner" />
  </div>

  <header class="container">
    <nav class="nav">
      <div style="font-weight: 900; font-size: 1.6rem;">die Ragebaiters</div>
      <div class="nav-links">
        <a href="index.html">Startseite</a>
        <a href="team.html">Team</a>
        <a class="active" href="mediathek.html">Mediathek</a>
        <a href="impressum.html">Impressum</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="upload-area">
      <h2>Inhalt hochladen</h2>
      <div class="form-group">
        <label>Bild auswählen</label>
        <input type="file" id="fileInput" accept="image/*">
      </div>
      <div class="form-group">
        <label>Titel</label>
        <input type="text" id="titleInput" placeholder="z.B. Spieltag im Wald">
      </div>
      <div class="form-group">
        <label>Beschreibung / Text zum Bild</label>
        <textarea id="descInput" rows="3" placeholder="Was ist auf dem Bild zu sehen?"></textarea>
      </div>
      <button class="btn-upload" id="uploadBtn">In Mediathek speichern</button>
    </section>

    <h2 style="margin-bottom: 25px;">Galerie</h2>
    <div id="gallery" class="media-grid">
      </div>
  </main>

  <script>
    // --- SUPABASE SETUP ---
    // Ersetze diese Werte mit deinen echten Daten aus dem Supabase Dashboard (Settings -> API)
    const SUPABASE_URL = 'DEINE_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'DEIN_ANON_KEY';
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const galleryElement = document.getElementById('gallery');

    // 1. FUNKTION: Daten aus der Datenbank laden und anzeigen
    async function loadGallery() {
      const { data, error } = await supabase
        .from('posts') // Name deiner Tabelle
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Fehler beim Laden:', error);
        return;
      }

      galleryElement.innerHTML = ''; // Leeren
      data.forEach(item => {
        const card = `
          <div class="media-card">
            <img src="${item.image_url}" alt="${item.title}">
            <div class="media-info">
              <h3>${item.title || 'Ohne Titel'}</h3>
              <p>${item.description || ''}</p>
            </div>
          </div>
        `;
        galleryElement.innerHTML += card;
      });
    }

    // 2. FUNKTION: Hochladen
    document.getElementById('uploadBtn').addEventListener('click', async () => {
      const fileInput = document.getElementById('fileInput');
      const titleInput = document.getElementById('titleInput');
      const descInput = document.getElementById('descInput');
      const file = fileInput.files[0];

      if (!file || !titleInput.value) {
        alert("Bitte Bild und Titel eingeben!");
        return;
      }

      const btn = document.getElementById('uploadBtn');
      btn.disabled = true;
      btn.innerText = "Wird hochgeladen...";

      // A) Bild in den Storage hochladen (Bucket Name: "images")
      const fileExt = file.name.split('.').pop();
      const fileName = `${Math.random()}.${fileExt}`;
      const filePath = `uploads/${fileName}`;

      const { error: uploadError } = await supabase.storage
        .from('images')
        .upload(filePath, file);

      if (uploadError) {
        alert("Upload Fehler: " + uploadError.message);
        btn.disabled = false;
        btn.innerText = "In Mediathek speichern";
        return;
      }

      // B) Public URL des Bildes holen
      const { data: urlData } = supabase.storage.from('images').getPublicUrl(filePath);
      const publicUrl = urlData.publicUrl;

      // C) Eintrag in die Tabelle "posts" schreiben
      const { error: dbError } = await supabase
        .from('posts')
        .insert([
          { 
            title: titleInput.value, 
            description: descInput.value, 
            image_url: publicUrl 
          }
        ]);

      if (dbError) {
        alert("Datenbank Fehler: " + dbError.message);
      } else {
        alert("Erfolgreich hinzugefügt!");
        // Formular leeren und Galerie neu laden
        fileInput.value = '';
        titleInput.value = '';
        descInput.value = '';
        loadGallery();
      }

      btn.disabled = false;
      btn.innerText = "In Mediathek speichern";
    });

    // Beim Laden der Seite Galerie anzeigen
    loadGallery();
  </script>
</body>
</html>
