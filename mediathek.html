<!DOCTYPE html>

        <a href="team.html">Team</a>

          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

        <a class="social-icon" href="https://www.instagram.com/die_ragebaiters/" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>

  <main class="container">
    <section class="section">
      <span class="eyebrow">Galerie</span>
      <h2 style="margin: 10px 0 4px;">Mediathek</h2>
      <p style="color: var(--muted); margin: 0 0 30px;">
        Eindrücke und Momente der Ragebaiters.
      </p>

      <div id="gallery"></div>

      <div id="lightbox" class="lightbox" role="dialog" aria-hidden="true">
        <button class="lightbox-close" type="button" aria-label="Schließen">&times;</button>
        <button class="lightbox-nav prev" type="button" aria-label="Vorheriges">‹</button>
        <button class="lightbox-nav next" type="button" aria-label="Nächstes">›</button>
        <img class="lightbox-img" src="" alt="">
        <div class="lightbox-caption"></div>
      </div>
    </section>
  </main>

  <footer class="footer container">
    <div style="font-weight: 800;">die Ragebaiters</div>
    <div style="font-size: 0.8rem; opacity: 0.6;">Est. 2026 • Made by sneiper0</div>
  </footer>

  <script src="nav.js?v=2026-04-23-1" defer></script>
  <script src="config.js"></script>
  <script type="module">
    import { supabase, initPage, getSessionUser, getProfile } from './auth.js?v=2026-04-23-1';
    await initPage('mediathek');

    const gallery = document.getElementById('gallery');
    const currentUser = await getSessionUser();
    const currentProfile = currentUser ? await getProfile(currentUser.id) : null;
    const currentRole = currentUser ? normalizeRole(currentProfile?.role) : 'guest';
    const canSeeInternalPosts = currentRole === 'admin' || currentRole === 'observer';
    const isAdmin = currentRole === 'admin';

    const { data, error } = await supabase.rpc('list_gallery_photos', {
      p_include_internal: canSeeInternalPosts
    });
    const photos = Array.isArray(data) ? data : [];

    if (error) {
      gallery.innerHTML = '<div class="alert alert-error">' + escapeHtml(error.message) + '</div>';
    } else if (!photos.length) {
      gallery.innerHTML = '<div class="card" style="text-align:center; color: var(--muted);">Es wurden noch keine Fotos hochgeladen.</div>';
    } else {
      const grid = document.createElement('div');
      grid.className = 'photo-grid lightbox-grid';
      for (const p of photos) {
        const imageUrl = resolvePhotoUrl(p.storage_path);
        const fig = document.createElement('figure');
        fig.className = 'photo-item';
        fig.dataset.full = imageUrl;
        fig.dataset.id = p.id;
        fig.dataset.path = p.storage_path;
        fig.dataset.title = p.title || '';
        fig.dataset.caption = p.caption || '';
        fig.dataset.author = p.author || '';
        fig.innerHTML = `
          <img src="${imageUrl}" alt="${escapeHtml(p.title || 'Mediathek Bild')}" loading="lazy">
          ${isAdmin ? '<button class="btn-delete" type="button" title="Loeschen">x</button>' : ''}`;
        grid.appendChild(fig);
      }
      gallery.appendChild(grid);
      if (isAdmin) {
        grid.querySelectorAll('.btn-delete').forEach(btn => {
          btn.addEventListener('click', async (event) => {
            event.stopPropagation();
            const fig = btn.closest('.photo-item');
            const photoId = Number(fig?.dataset.id);
            const photoPath = fig?.dataset.path || '';
            if (!photoId) return;
            if (!confirm('Dieses Bild wirklich aus der Mediathek loeschen?')) return;

            if (photoPath && !String(photoPath).startsWith('__local__/')) {
              const { error: storageError } = await supabase.storage.from('photos').remove([photoPath]);
              if (storageError && !/not found|no such object|not exists/i.test(storageError.message || '')) {
                return alert(storageError.message);
              }
            }

            const { data: deleted, error: deleteError } = await supabase.rpc('admin_delete_photo', {
              p_photo_id: photoId
            });
            if (deleteError) return alert(deleteError.message);
            if (!deleted) return alert('Bild konnte nicht geloescht werden.');
            fig.remove();
            if (!grid.querySelector('.photo-item')) {
              gallery.innerHTML = '<div class="card" style="text-align:center; color: var(--muted);">Es wurden noch keine Fotos hochgeladen.</div>';
            }
          });
        });
      }
      initLightbox(grid);
    }

    function initLightbox(grid) {
      const lb = document.getElementById('lightbox');
      const img = lb.querySelector('.lightbox-img');
      const cap = lb.querySelector('.lightbox-caption');
      const btnClose = lb.querySelector('.lightbox-close');
      const btnPrev  = lb.querySelector('.prev');
      const btnNext  = lb.querySelector('.next');
      const items = [...grid.querySelectorAll('.photo-item')];
      let idx = -1;
      function show(i) {
        if (i < 0 || i >= items.length) return;
        idx = i;
        const it = items[i];
        img.src = it.dataset.full;
        cap.innerHTML = `
          <strong>${escapeHtml(it.dataset.title)}</strong>
          ${it.dataset.caption ? `<p>${escapeHtml(it.dataset.caption)}</p>` : ''}
          ${it.dataset.author ? `<span>von ${escapeHtml(it.dataset.author)}</span>` : ''}`;
        lb.classList.add('is-open');
        lb.setAttribute('aria-hidden', 'false');
      }
      function close() {
        lb.classList.remove('is-open');
        lb.setAttribute('aria-hidden', 'true');
        img.src = '';
      }
      items.forEach((it, i) => it.addEventListener('click', (e) => { e.preventDefault(); show(i); }));
      btnClose.addEventListener('click', close);
      btnPrev.addEventListener('click', () => show((idx - 1 + items.length) % items.length));
      btnNext.addEventListener('click', () => show((idx + 1) % items.length));
      lb.addEventListener('click', e => { if (e.target === lb) close(); });
      document.addEventListener('keydown', e => {
        if (!lb.classList.contains('is-open')) return;
        if (e.key === 'Escape')     close();
        if (e.key === 'ArrowLeft')  show((idx - 1 + items.length) % items.length);
        if (e.key === 'ArrowRight') show((idx + 1) % items.length);
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function normalizeRole(role) {
      return ['observer', 'member', 'admin'].includes(role) ? role : 'guest';
    }

    function resolvePhotoUrl(path) {
      if (String(path || '').startsWith('__local__/')) {
        return path.replace('__local__/', '');
      }
      const { data: pub } = supabase.storage.from('photos').getPublicUrl(path);
      return pub.publicUrl;
    }
  </script>
</body>
</html>
