  <main class="container">
    <section class="section">
      <div class="auth-wrap">
        <div class="auth-card card">
          <span class="eyebrow">Neuer Account</span>
          <h2 style="margin: 10px 0 4px;">Registrieren</h2>
          <p style="color: var(--muted); margin: 0 0 24px;">
            Du brauchst einen Einladungscode vom Teamführer.
          </p>

          <div id="alert" class="alert alert-error" hidden></div>
          <div id="success" class="alert" style="background: rgba(183,255,60,0.08); border-color: rgba(183,255,60,0.35); color: var(--accent);" hidden></div>

          <form id="regForm" class="auth-form" autocomplete="on">
            <label class="field">
              <span>Einladungscode</span>
              <input type="text" name="invite" required autofocus>
            </label>
            <label class="field">
              <span>Benutzername</span>
              <input type="text" name="username" required minlength="3" maxlength="32" pattern="[A-Za-z0-9_\-\.]+">
            </label>
            <label class="field">
              <span>E-Mail</span>
              <input type="email" name="email" required>
            </label>
            <label class="field">
              <span>Passwort (min. 8 Zeichen)</span>
              <input type="password" name="password" required minlength="8">
            </label>
            <label class="field">
              <span>Passwort wiederholen</span>
              <input type="password" name="password2" required minlength="8">
            </label>
            <button type="submit" class="btn-primary" id="submitBtn">Registrieren</button>
          </form>

          <p class="auth-hint">
            Schon einen Account? <a class="inline-link" href="login.html">Zum Login mit Benutzername</a>
          </p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer container">
    <div style="font-weight: 800;">die Ragebaiters</div>

  </footer>

  <script src="nav.js?v=2026-04-23-1" defer></script>
  <script src="config.js"></script>
  <script type="module">
    import { supabase, initPage, getSessionUser, buildScopedUrl, waitForSessionUser, rememberPendingSession } from './auth.js?v=2026-04-23-1';
    await initPage('login');

    if (await getSessionUser()) location.href = buildScopedUrl('dashboard.html');

    const form    = document.getElementById('regForm');
    const alertE  = document.getElementById('alert');
    const okE     = document.getElementById('success');
    const btn     = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertE.hidden = true;
      okE.hidden = true;
      btn.disabled = true;
      btn.textContent = 'Wird angelegt …';

      const fd = new FormData(form);
      const invite  = fd.get('invite').trim();
      const user    = fd.get('username').trim();
      const mail    = fd.get('email').trim();
      const pw      = fd.get('password');
      const pw2     = fd.get('password2');

      if (pw !== pw2) return fail('Passwörter stimmen nicht überein.');

      // 1) Username bereits vergeben?
      const { data: existing } = await supabase
        .from('profiles').select('id').ilike('username', user).maybeSingle();
      if (existing) return fail('Benutzername bereits vergeben.');

      // 2) Einladungscode vorab prÃ¼fen, damit kein Auth-Account ohne Invite entsteht
      const { data: inviteOk, error: inviteErr } = await supabase.rpc('check_invite_code', { p_code: invite });
      if (inviteErr) return fail('Einladungscode konnte nicht geprÃ¼ft werden: ' + inviteErr.message);
      if (!inviteOk) return fail('Einladungscode ungÃ¼ltig oder bereits verwendet.');

      // 3) Account anlegen
      const { data: signUp, error: signErr } = await supabase.auth.signUp({
        email: mail, password: pw,
        options: { data: { username: user } }
      });
      if (signErr) return fail(mapError(signErr.message));

      const uid = signUp.user?.id;

      // Falls Email-Confirmation AN ist, haben wir noch keine Session -> direkt einloggen
      let session = signUp.session;
      if (!session) {
        const { data: login } = await supabase.auth.signInWithPassword({ email: mail, password: pw });
        session = login?.session;
      }

      if (!session) {
        okE.textContent = 'Konto angelegt. Bitte bestätige die Mail in deinem Postfach, dann kannst du dich einloggen.';
        okE.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Registrieren';
        return;
      }

      // 3) Einladungscode einlösen
      rememberPendingSession(session);
      const { data: inviteRole, error: redErr } = await supabase.rpc('redeem_invite', { p_code: invite });
      if (redErr || !inviteRole) {
        // Account existiert jetzt, aber Invite ist falsch -> Account wieder raus
        await supabase.auth.signOut();
        return fail('Einladungscode wurde gerade bereits verwendet. Bitte frage den Teamführer nach einem neuen Code.');
      }

      // 4) Profil anlegen
      const { error: profErr } = await supabase.from('profiles').upsert({
        id: uid, username: user, role: inviteRole
      }, { onConflict: 'id' });
      if (profErr) return fail('Profil konnte nicht angelegt werden: ' + profErr.message);

      const readyUser = await waitForSessionUser();
      if (!readyUser) return fail('Session wurde nicht rechtzeitig geladen. Bitte erneut anmelden.');

      location.href = buildScopedUrl('dashboard.html');
    });

    function fail(msg) {
      alertE.textContent = msg;
      alertE.hidden = false;
      btn.disabled = false;
      btn.textContent = 'Registrieren';
    }
    function mapError(msg) {
      if (/already registered/i.test(msg)) return 'Diese E-Mail ist bereits registriert.';
      if (/password/i.test(msg)) return 'Passwort entspricht nicht den Anforderungen.';
      return msg;
    }
  </script>
</body>
