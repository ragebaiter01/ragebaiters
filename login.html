<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | die Ragebaiters</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <div class="top-banner">
    <img src="images/banner2.png" alt="die Ragebaiters Banner" />
  </div>

  <header class="container">
    <nav class="nav">
      <div class="nav-brand">
        <div class="nav-title">die Ragebaiters</div>
      </div>
      <button class="nav-toggle" type="button" aria-label="Menü" aria-expanded="false">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <div class="nav-links">
        <a href="index.html">Startseite</a>
        <a href="team.html">Team</a>
        <a href="mediathek.html">Mediathek</a>
        <a href="impressum.html">Impressum</a>
        <a class="social-icon" href="https://www.youtube.com/@RagebaitersAS" target="_blank" rel="noopener" aria-label="YouTube" title="YouTube">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M23.498 6.186a2.999 2.999 0 0 0-2.112-2.122C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.386.564A2.999 2.999 0 0 0 .502 6.186C0 8.074 0 12 0 12s0 3.926.502 5.814a2.999 2.999 0 0 0 2.112 2.122C4.495 20.5 12 20.5 12 20.5s7.505 0 9.386-.564a2.999 2.999 0 0 0 2.112-2.122C24 15.926 24 12 24 12s0-3.926-.502-5.814zM9.75 15.568V8.432L15.818 12 9.75 15.568z"/>
          </svg>
        </a>
        <a class="social-icon" href="https://www.instagram.com/die_ragebaiters/" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </a>
      </div>
    </nav>
    <div class="nav-backdrop" aria-hidden="true"></div>
  </header>

  <main class="container">
    <section class="section">
      <div class="auth-wrap">
        <div class="auth-card card">
          <span class="eyebrow">Interner Bereich</span>
          <h2 style="margin: 10px 0 4px;">Anmelden</h2>
          <p style="color: var(--muted); margin: 0 0 24px;">Melde dich an, um Fotos hochzuladen.</p>

          <div id="alert" class="alert alert-error" hidden></div>

          <form id="loginForm" class="auth-form" autocomplete="on">
            <label class="field">
              <span>Benutzername oder E-Mail</span>
              <input type="text" name="identifier" required autofocus autocomplete="username">
            </label>
            <label class="field">
              <span>Passwort</span>
              <input type="password" name="password" required autocomplete="current-password">
            </label>
            <button type="submit" class="btn-primary" id="submitBtn">Anmelden</button>
          </form>

          <p class="auth-hint">
            Noch kein Account? <a class="inline-link" href="register.html">Jetzt registrieren</a>
          </p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer container">
    <div style="font-weight: 800;">die Ragebaiters</div>
    <div style="font-size: 0.8rem; opacity: 0.6;">Est. 2026 • Made by sneiper0</div>
  </footer>

  <script src="nav.js?v=2026-04-23-1" defer></script>
  <script src="config.js"></script>
  <script type="module">
    import { supabase, initPage, getSessionUser, buildScopedUrl, waitForSessionUser, rememberPendingSession, resolveLoginEmail } from './auth.js?v=2026-04-23-1';
    await initPage('login');

    // Wenn bereits eingeloggt -> Dashboard
    if (await getSessionUser()) location.href = buildScopedUrl('dashboard.html');

    const form   = document.getElementById('loginForm');
    const alertE = document.getElementById('alert');
    const btn    = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertE.hidden = true;
      btn.disabled = true;
      btn.textContent = 'Anmelden …';

      const fd = new FormData(form);
      const identifier = fd.get('identifier').trim();
      const email = await resolveLoginEmail(identifier);

      if (!email) {
        alertE.textContent = 'Benutzername oder Passwort falsch.';
        alertE.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Anmelden';
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password: fd.get('password'),
      });

      if (error) {
        alertE.textContent = mapError(error.message);
        alertE.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Anmelden';
        return;
      }

      rememberPendingSession(data?.session);

      const readyUser = await waitForSessionUser();
      if (!readyUser) {
        alertE.textContent = 'Session wurde nicht rechtzeitig geladen. Bitte noch einmal anmelden.';
        alertE.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Anmelden';
        return;
      }

      location.href = buildScopedUrl('dashboard.html');
    });

    function mapError(msg) {
      if (/invalid login/i.test(msg)) return 'Benutzername oder Passwort falsch.';
      if (/email not confirmed/i.test(msg)) return 'Bitte zuerst die Bestätigungs-Mail öffnen.';
      return msg;
    }
  </script>
</body>
</html>
